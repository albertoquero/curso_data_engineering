version: 2

sources:

  - name: google_sheets # name of the source 
    schema: google_sheets # this is the schema our raw data lives in
    database:  "{{ env_var('DBT_DB_USER') }}_{{ env_var('DBT_ENVIRONMENTS_LAYER') }}_BRONZE_DB" # this is the name of our database

    quoting:
      database: false
      schema: false
      identifier: false

 
    tables:
      - name: users
        columns:
          - name: Nombre
          - name: DNI
          - name: email
          - name: fecha_alta_sistema
      - name: budget
        description: >
          Data about budget in demo.
        columns:
          - name: quantity
            description: >
              Number of units for each product and each month for products.
            #tests:
            #  - positive_values
          - name: month
            description: >
              Each month for the budget -> End of the month.
            tests:
              - not_null
          - name: product_id
            
          - name: _fivetran_synced
            description: >
              Date that the data was loaded.
        